version: '3.8'

services:
  postgres-order:
    image: postgres:15-alpine
    container_name: postgres-order
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    volumes:
      - pgdata-order:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-payment:
    image: postgres:15-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - "5433:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-product:
    image: postgres:15-alpine
    container_name: postgres-product
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: products
    ports:
      - "5434:5432"
    volumes:
      - pgdata-product:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d products"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-user:
    image: postgres:15-alpine
    container_name: postgres-user
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    ports:
      - "5435:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (Used by Cart Service)
  redis-cart:
    image: redis:7-alpine
    container_name: redis-cart 
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Elasticsearch (Used by Product Service)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.8
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Kafka (Used by Order, Payment, Product, Notification)
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:19093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  postgres-notification:
    image: postgres:15-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification
    ports:
      - "5436:5432"
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

  config:
    build: ./config
    container_name: config
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/application/default"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  discovery:
    build: ./discovery
    container_name: discovery
    ports:
      - "8761:8761"
    env_file:
      - ./.env
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      config:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8222:8222"
    env_file:
      - ./.env
    environment:
      - EUREKA_HOST=discovery
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy

  user:
    build: ./user
    container_name: user
    ports:
      - "8084:8084"
    env_file:
      - ./.env
    environment:
      - EUREKA_HOST=discovery
      - DB_HOST=postgres-user
      - DB_PORT=5432
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      postgres-user:
        condition: service_healthy

  product:
    build: ./product
    container_name: product
    ports:
      - "8082:8082"
    env_file:
      - ./.env
    environment:
      - EUREKA_HOST=discovery
      - DB_HOST=postgres-product
      - DB_PORT=5432
      - KAFKA_URL=kafka:19092
      - ES_HOST=elasticsearch
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      postgres-product:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started

  order:
    build: ./order
    container_name: order
    ports:
      - "8081:8081"
    env_file:
      - ./.env
    environment:
      - EUREKA_HOST=discovery
      - DB_HOST=postgres-order
      - DB_PORT=5432
      - KAFKA_URL=kafka:19092
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_started

  payment:
    build: ./payment
    container_name: payment
    ports:
      - "8083:8083"
    env_file:
      - ./.env
    environment:
      - EUREKA_HOST=discovery
      - DB_HOST=postgres-payment
      - DB_PORT=5432
      - KAFKA_URL=kafka:19092
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_started

  notification:
    build: ./notification
    container_name: notification
    ports:
      - "8085:8085"
    env_file:
      - ./.env
    environment:
      - EUREKA_HOST=discovery
      - DB_HOST=postgres-notification
      - DB_PORT=5432
      - KAFKA_URL=kafka:19092
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_started

  cart:
    build: ./cart
    container_name: cart
    ports:
      - "8086:8086"
    env_file:
      - ./.env
    environment:
      - EUREKA_HOST=discovery
      - REDIS_HOST=redis-cart
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config:8888
    depends_on:
      config:
        condition: service_healthy
      discovery:
        condition: service_healthy
      redis-cart:
        condition: service_healthy

volumes:
  pgdata-order:
  pgdata-payment:
  pgdata-product:
  pgdata-user:
  pgdata-notification:
  esdata:
