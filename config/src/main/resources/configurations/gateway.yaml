management:
  tracing:
    sampling:
      probability: 1.0
eureka:
  client:
    register-with-eureka: false
server:
  port: 8222
spring:
  application:
    name: gateway
  cloud:
    gateway:
      default-filters:
        - AuthenticationFilter
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
app:
  jwt:
    secret: ${JWT_SECRET:xjPc1RLUXukJgO9yI1ryhVa1YY3msah9pig5sWBn1pi}
    jwtCookieName: jwt-access
